<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" rx="150" fill="#141414" stroke="#222222" stroke-width="4"/>
  
  <!-- Outer glowing ring -->
  <circle cx="150" cy="150" r="146" fill="none" stroke="#00ff66" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Gamepad body -->
  <rect x="75" y="110" width="150" height="85" rx="42.5" fill="#0a0a0a" stroke="#222222" stroke-width="3"/>
  <path d="M 85,152.5 C 75,190 120,205 135,175 C 145,155 155,155 165,175 C 180,205 225,190 215,152.5" fill="#0a0a0a" stroke="#222222" stroke-width="3"/>
  
  <!-- D-pad (Left side) -->
  <rect x="100" y="142.5" width="20" height="7" rx="1" fill="#222222"/>
  <rect x="106.5" y="136" width="7" height="20" rx="1" fill="#222222"/>
  <circle cx="110" cy="146" r="3" fill="#00ff66"/>
  
  <!-- Action Buttons (Right side) -->
  <circle cx="185" cy="140" r="6" fill="#222222"/>
  <circle cx="197" cy="148" r="6" fill="#00ff66"/>
  <circle cx="185" cy="156" r="6" fill="#222222"/>
  <circle cx="173" cy="148" r="6" fill="#222222"/>
  
  <!-- Mini analog sticks -->
  <circle cx="132" cy="165" r="14" fill="#141414" stroke="#222222" stroke-width="2"/>
  <circle cx="132" cy="165" r="8" fill="#0a0a0a"/>
  
  <circle cx="168" cy="165" r="14" fill="#141414" stroke="#222222" stroke-width="2"/>
  <circle cx="168" cy="165" r="8" fill="#0a0a0a"/>
  
  <!-- Start & Select -->
  <rect x="135" y="130" width="12" height="4" rx="1" transform="rotate(-15 135 130)" fill="#222222"/>
  <rect x="153" y="130" width="12" height="4" rx="1" transform="rotate(-15 153 130)" fill="#00ff66"/>
  
  <!-- Screen element text -->
  <text x="115" y="90" fill="#888888" font-family="'Inter', sans-serif" font-size="11" font-weight="600" letter-spacing="1">MI PASATIEMPO</text>
</svg>
