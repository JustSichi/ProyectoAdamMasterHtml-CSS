<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <rect width="400" height="250" rx="6" fill="#141414" stroke="#222222" stroke-width="2"/>
  
  <!-- UI Window header -->
  <rect x="20" y="20" width="360" height="40" rx="4" fill="#0a0a0a" stroke="#222222"/>
  <text x="40" y="45" fill="#ffffff" font-family="'Inter', sans-serif" font-size="14" font-weight="600">Conversor de Moneda</text>
  
  <!-- Inputs area -->
  <!-- Amount -->
  <text x="30" y="90" fill="#888888" font-family="'Inter', sans-serif" font-size="10" font-weight="600">CANTIDAD</text>
  <rect x="30" y="100" width="100" height="30" rx="4" fill="#000000" stroke="#222222"/>
  <text x="40" y="120" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12">150.00</text>
  
  <!-- Currency Selectors -->
  <text x="145" y="90" fill="#888888" font-family="'Inter', sans-serif" font-size="10" font-weight="600">DE</text>
  <rect x="145" y="100" width="90" height="30" rx="4" fill="#000000" stroke="#222222"/>
  <text x="155" y="120" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12">EUR (€)</text>
  
  <text x="250" y="90" fill="#888888" font-family="'Inter', sans-serif" font-size="10" font-weight="600">A</text>
  <rect x="250" y="100" width="90" height="30" rx="4" fill="#000000" stroke="#00ff66"/>
  <text x="260" y="120" fill="#00ff66" font-family="'Inter', sans-serif" font-size="12">USD ($)</text>
  
  <!-- Swap Arrow icon mock -->
  <path d="M 239,115 L 246,115 M 241,111 L 237,115 L 241,119" stroke="#888888" stroke-width="1.5" fill="none"/>
  
  <!-- Result Box -->
  <rect x="30" y="155" width="340" height="60" rx="4" fill="#0a0a0a" stroke="#222222"/>
  <text x="45" y="178" fill="#888888" font-family="'Inter', sans-serif" font-size="10">150.00 EUR equivale a</text>
  <text x="45" y="200" fill="#00ff66" font-family="'Inter', sans-serif" font-size="16" font-weight="700">162.75 USD</text>
</svg>
