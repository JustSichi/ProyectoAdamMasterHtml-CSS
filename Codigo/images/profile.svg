<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" rx="150" fill="#141414" stroke="#222222" stroke-width="4"/>
  
  <!-- Outer glowing ring -->
  <circle cx="150" cy="150" r="146" fill="none" stroke="#00ff66" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Developer Avatar illustration -->
  <!-- Background coding lines -->
  <rect x="50" y="80" width="60" height="6" rx="3" fill="#222222"/>
  <rect x="50" y="95" width="40" height="6" rx="3" fill="#00ff66" opacity="0.3"/>
  <rect x="190" y="70" width="50" height="6" rx="3" fill="#222222"/>
  <rect x="190" y="85" width="70" height="6" rx="3" fill="#00ff66" opacity="0.3"/>
  
  <!-- Body/Shoulders -->
  <path d="M 70,260 C 70,200 100,185 150,185 C 200,185 230,200 230,260" fill="#00ff66" opacity="0.8"/>
  <path d="M 120,185 L 150,215 L 180,185 Z" fill="#00b347"/>
  
  <!-- Head -->
  <circle cx="150" cy="130" r="45" fill="#fce2c4"/>
  
  <!-- Hair (Simple programmer cap or clean haircut) -->
  <path d="M 105,130 C 105,80 195,80 195,130 Z" fill="#0a0a0a"/>
  
  <!-- Glasses -->
  <rect x="117" y="122" width="28" height="18" rx="3" fill="none" stroke="#000000" stroke-width="3"/>
  <rect x="155" y="122" width="28" height="18" rx="3" fill="none" stroke="#000000" stroke-width="3"/>
  <line x1="145" y1="130" x2="155" y2="130" stroke="#000000" stroke-width="3"/>
  
  <!-- Eyes -->
  <circle cx="131" cy="130" r="3" fill="#000000"/>
  <circle cx="169" cy="130" r="3" fill="#000000"/>
  
  <!-- Smile -->
  <path d="M 142,155 Q 150,162 158,155" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
</svg>
